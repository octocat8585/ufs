name: CI
on:
  push:
    tags: ["v*"]
    branches: ["main"]
  pull_request:
    branches: ["main"]
jobs:
  build-linux:
    runs-on: ["self-hosted", "linux", "large"]
    steps:
      - name: Checkout
        # https://github.com/actions/checkout
        uses: actions/checkout@v6
      - name: Setup Go
        # https://github.com/actions/setup-go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Build
        run: make build -j$(nproc)
      - name: Test
        run: make test
      - name: Test (Deflake)
        run: make test-deflake
  build-windows:
    runs-on: ["self-hosted", "windows"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: stable
      - name: Build
        run: make all -j8
      - name: Test
        run: make test
      - name: Test (Race Test)
        run: make GO_TEST_COUNT=5 test-deflake
